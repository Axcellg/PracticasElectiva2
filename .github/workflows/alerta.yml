name: Alerta de Push a Main

on:
  push:
    branches:
      - main

jobs:
  notificar:
    name: Enviar Notificación a ntfy.sh
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Ejecutar programa Hola Mundo
        run: node index.js

      - name: Enviar notificación a ntfy.sh/devops-itla
        run: |
          curl -X POST https://ntfy.sh/devops-itla \
            -H "Title: 🚀 Push a main detectado" \
            -H "Priority: high" \
            -H "Tags: white_check_mark,github" \
            -d "✅ Repositorio: ${{ github.repository }}
          👤 Autor: ${{ github.actor }}
          📝 Commit: ${{ github.event.head_commit.message }}
          🕐 Hora: $(date '+%Y-%m-%d %H:%M:%S UTC')
          🔗 Ver cambios: ${{ github.event.head_commit.url }}"
